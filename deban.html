<!DOCTYPE html>
<html lang="fr">

<head>

<meta charset="UTF-8">
<title>Demande de déban | MVP FivePD</title>

<style>

body{
margin:0;
font-family:Arial;
background:#021b33;
color:white;
}

header{
background:#051d44;
padding:15px 40px;
display:flex;
justify-content:space-between;
align-items:center;
border-bottom:2px solid red;
}

.logo{
font-size:28px;
color:#3bc3ff;
font-weight:bold;
}

nav a{
color:white;
margin-left:25px;
text-decoration:none;
font-weight:bold;
}

.container{
max-width:900px;
margin:auto;
padding:40px;
}

.title{
text-align:center;
font-size:32px;
margin-bottom:20px;
}

.info{
background:#0a2c52;
padding:15px;
border-radius:8px;
text-align:center;
margin-bottom:30px;
}

form{
display:grid;
grid-template-columns:1fr 1fr;
gap:20px;
}

.full{
grid-column:1/3;
}

input,textarea{
width:100%;
padding:12px;
background:#031a33;
border:1px solid #0a2c52;
color:white;
border-radius:6px;
}

textarea{
height:150px;
resize:none;
}

.counter{
font-size:14px;
opacity:0.7;
margin-top:5px;
}

.radio{
grid-column:1/3;
margin-top:10px;
}

button{
grid-column:1/3;
padding:14px;
border:none;
border-radius:6px;
background:#28a745;
color:white;
font-size:16px;
cursor:pointer;
}

footer{
text-align:center;
margin-top:40px;
opacity:0.6;
}

</style>

</head>

<body>

<header>

<div class="logo">
MVP FivePD
</div>

<nav>

<a href="index.html">Accueil</a>
<a href="reglement.html">Règlement</a>
<a href="deban.html">Déban</a>
<a href="support.html">Support</a>

</nav>

</header>

<div class="container">

<div class="title">
🔨 Vous êtes banni(e) ?
</div>

<div class="info">
La sanction peut être temporaire ou définitive.  
Veuillez remplir correctement le formulaire pour faire appel.
</div>

<form id="debanForm">

<input type="text" id="discord" placeholder="Pseudo Discord" required>

<input type="text" id="raison" placeholder="Raison du bannissement">

<input type="date" id="date">

<input type="text" id="staff" placeholder="Modérateur / Admin qui vous a banni">

<div class="full">

<label>Vos motivations pour revenir sur le serveur</label>

<textarea id="motivation" placeholder="Expliquez pourquoi vous souhaitez revenir..." required></textarea>

<div class="counter" id="counter">
Minimum 100 caractères
</div>

</div>

<div class="full">

<label>Pourquoi devrions-nous lever la sanction ?</label>

<textarea id="confiance" placeholder="Soyez convaincant..." required></textarea>

</div>

<div class="radio">

<label>Type de bannissement :</label>

<input type="radio" name="ban" value="Permanent"> Permanent

<input type="radio" name="ban" value="Temporaire"> Temporaire

</div>

<div class="radio">

<input type="checkbox" required>
J'ai relu le règlement et compris la raison de la sanction

</div>

<button type="submit">
ENVOYER MA DEMANDE
</button>

</form>

</div>

<footer>

MVP FivePD • Support

</footer>

<script>

const webhook = "https://discordapp.com/api/webhooks/1482384579556806706/sPNqdGcHxEss_lGwkwEy8Wu9i1VC_MuRIZmhuuYPXhZYWRtC5Y7FSKem3YceN4Q4quRp";

const textarea = document.getElementById("motivation");
const counter = document.getElementById("counter");

textarea.addEventListener("input", () => {

let remaining = 100 - textarea.value.length;

if(remaining > 0){

counter.innerText = "Encore " + remaining + " caractères minimum";

}else{

counter.innerText = "Minimum atteint";

}

});

document.getElementById("debanForm").addEventListener("submit", function(e){

e.preventDefault();

if(textarea.value.length < 100){

alert("Vous devez écrire au moins 100 caractères pour vos motivations.");
return;

}

const discord = document.getElementById("discord").value;
const raison = document.getElementById("raison").value;
const date = document.getElementById("date").value;
const staff = document.getElementById("staff").value;
const motivation = document.getElementById("motivation").value;
const confiance = document.getElementById("confiance").value;

fetch(webhook,{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({

embeds:[{

title:"📩 Nouvelle demande de déban",

color:3447003,

fields:[

{name:"Discord",value:discord},
{name:"Raison du ban",value:raison},
{name:"Date du ban",value:date},
{name:"Staff",value:staff},
{name:"Motivations",value:motivation},
{name:"Pourquoi lever la sanction",value:confiance}

],

footer:{
text:"MVP FivePD • Demande de déban"
}

}]

})

});

alert("Votre demande a été envoyée au staff.");

});

</script>

</body>
</html>
