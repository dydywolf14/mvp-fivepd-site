<!DOCTYPE html>
<html lang="fr">

<head>

<meta charset="UTF-8">
<title>Demande de déban | MVP FivePD</title>

<style>

body{
margin:0;
font-family:Arial;
background:#021b33;
color:white;
}

header{
background:#051d44;
padding:15px 40px;
display:flex;
justify-content:space-between;
align-items:center;
border-bottom:2px solid red;
}

.logo{
font-size:28px;
color:#3bc3ff;
font-weight:bold;
}

nav a{
color:white;
margin-left:25px;
text-decoration:none;
font-weight:bold;
}

.container{
max-width:900px;
margin:auto;
padding:40px;
}

.title{
text-align:center;
font-size:32px;
margin-bottom:20px;
}

form{
display:grid;
grid-template-columns:1fr 1fr;
gap:20px;
}

.full{
grid-column:1/3;
}

input,textarea{
width:100%;
padding:12px;
background:#031a33;
border:1px solid #0a2c52;
color:white;
border-radius:6px;
}

textarea{
height:150px;
resize:none;
}

.counter{
font-size:14px;
opacity:0.7;
margin-top:5px;
}

.radio{
grid-column:1/3;
margin-top:10px;
}

button{
grid-column:1/3;
padding:14px;
border:none;
border-radius:6px;
background:#28a745;
color:white;
font-size:16px;
cursor:pointer;
}

.hidden{
display:none;
}

</style>

</head>

<body>

<header>

<div class="logo">
MVP FivePD
</div>

<nav>

<a href="index.html">Accueil</a>
<a href="deban.html">Déban</a>

</nav>

</header>

<div class="container">

<div class="title">
🔨 Demande de déban
</div>

<form id="debanForm">

<input type="text" id="discord" placeholder="Pseudo Discord" required>

<input type="text" id="raison" placeholder="Raison du bannissement">

<input type="text" id="staff" placeholder="Staff qui vous a banni">

<div class="radio">

<label>Type de bannissement :</label>

<input type="radio" name="ban" value="Permanent" onclick="toggleDate()"> Permanent
<input type="radio" name="ban" value="Définitif" onclick="toggleDate()"> Définitif

</div>

<div id="dateBan" class="full hidden">

<label>Date de votre ban</label>
<input type="date" id="date">

</div>

<div class="full">

<label>Capture du ban txAdmin</label>

<input type="file" id="preuve" accept="image/*,.pdf" required>

</div>

<div class="full">

<label>Vos motivations pour revenir sur le serveur</label>

<textarea id="motivation" required></textarea>

<div class="counter" id="counter1">
Minimum 150 caractères
</div>

</div>

<div class="full">

<label>Pourquoi devrions-nous lever la sanction ?</label>

<textarea id="confiance" required></textarea>

<div class="counter" id="counter2">
Minimum 150 caractères
</div>

</div>

<button type="submit">
ENVOYER MA DEMANDE
</button>

</form>

</div>

<script>

const webhook = "https://discordapp.com/api/webhooks/1482384579556806706/sPNqdGcHxEss_lGwkwEy8Wu9i1VC_MuRIZmhuuYPXhZYWRtC5Y7FSKem3YceN4Q4quRp";

function toggleDate(){

const type = document.querySelector('input[name="ban"]:checked').value;

if(type === "Permanent"){
document.getElementById("dateBan").classList.remove("hidden");
}else{
document.getElementById("dateBan").classList.add("hidden");
}

}

const motivation = document.getElementById("motivation");
const confiance = document.getElementById("confiance");

const counter1 = document.getElementById("counter1");
const counter2 = document.getElementById("counter2");

motivation.addEventListener("input", () => {

let remaining = 150 - motivation.value.length;

counter1.innerText = remaining > 0
? "Encore " + remaining + " caractères minimum"
: "Minimum atteint";

});

confiance.addEventListener("input", () => {

let remaining = 150 - confiance.value.length;

counter2.innerText = remaining > 0
? "Encore " + remaining + " caractères minimum"
: "Minimum atteint";

});

document.getElementById("debanForm").addEventListener("submit", async function(e){

e.preventDefault();

if(motivation.value.length < 150){
alert("Motivations minimum 150 caractères");
return;
}

if(confiance.value.length < 150){
alert("Justification minimum 150 caractères");
return;
}

const discord = document.getElementById("discord").value;
const raison = document.getElementById("raison").value;
const staff = document.getElementById("staff").value;
const date = document.getElementById("date").value;
const file = document.getElementById("preuve").files[0];

const formData = new FormData();

formData.append("payload_json", JSON.stringify({

content:"📩 Nouvelle demande de déban",

embeds:[{

title:"Demande de déban MVP FivePD",

fields:[

{name:"Discord",value:discord},
{name:"Raison du ban",value:raison},
{name:"Staff",value:staff},
{name:"Date du ban",value:date || "Définitif"},
{name:"Motivations",value:motivation.value},
{name:"Pourquoi lever la sanction",value:confiance.value}

]

}]

}));

formData.append("file", file);

fetch(webhook,{
method:"POST",
body:formData
});

alert("Demande envoyée au staff.");

});

</script>

</body>
</html>
