<!DOCTYPE html>
<html lang="fr">

<head>
<meta charset="UTF-8">
<title>MVP | FivePD</title>

<style>

body{
margin:0;
font-family:Arial;
background:#021b33;
color:white;
}

/* HEADER */

header{
background:#051d44;
padding:15px 40px;
display:flex;
justify-content:space-between;
align-items:center;
border-bottom:2px solid red;
}

.logo{
display:flex;
align-items:center;
gap:10px;
}

.logo img{
height:55px;
}

/* LOGO TEXTE */

.logo-text{
font-size:28px;
font-weight:900;
background:linear-gradient(90deg,#6a00ff,#ff2a6d);
-webkit-background-clip:text;
color:transparent;
letter-spacing:2px;
}

/* NAV */

nav{
display:flex;
align-items:center;
}

/* BOUTON MAISON */

.home-btn{
background:#1f4ed8;
padding:8px 12px;
border-radius:10px;
margin-right:15px;
display:flex;
align-items:center;
justify-content:center;
transition:0.3s;
}

.home-btn img{
width:18px;
filter:invert(1);
}

.home-btn:hover{
background:#2563eb;
transform:scale(1.1);
}

nav a{
color:white;
margin-left:20px;
text-decoration:none;
font-weight:bold;
}

/* HERO */

.hero{
height:700px;
background:
linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)),
url("marseille.png") center/cover no-repeat;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
padding:20px;
}

.hero h1{
font-size:55px;
}

.description{
max-width:900px;
line-height:1.7;
}

/* JOUEURS */

.players-box{
background:#1f4ed8;
padding:12px 30px;
border-radius:8px;
margin-top:20px;
font-size:20px;
}

/* BOUTONS */

.buttons{
margin-top:30px;
}

.btn{
padding:15px 35px;
border-radius:6px;
background:#28a745;
color:white;
text-decoration:none;
margin:10px;
display:inline-block;
}

/* TIKTOK */

.tiktok{
margin-top:30px;
}

.tiktok img{
width:70px;
}

/* FEATURES */

.features{
background:#061a3a;
padding:80px 20px;
text-align:center;
}

.cards{
display:flex;
justify-content:center;
gap:40px;
flex-wrap:wrap;
}

.card img{
width:300px;
border-radius:10px;
}

/* TEAM */

.team{
background:#04152d;
padding:80px 20px;
text-align:center;
}

.team-grid{
display:flex;
justify-content:center;
gap:120px;
flex-wrap:wrap;
}

.member{
width:200px;
text-align:center;
}

.member img{
width:80px;
border-radius:50%;
}

.roles{
margin-top:10px;
}

.role{
padding:6px 12px;
border-radius:20px;
margin:5px;
display:inline-block;
}

.red{
background:#ff2a6d;
}

.purple{
background:#6a00ff;
}

.separator{
margin:40px auto;
width:60%;
border:1px solid rgba(255,255,255,0.2);
}

/* FOOTER */

footer{
text-align:center;
padding:20px;
background:#051d44;
}

</style>
</head>

<body>

</html>
