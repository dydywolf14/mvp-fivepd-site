<!DOCTYPE html>
<html lang="fr">

<head>

<meta charset="UTF-8">
<title>MVP | FivePD</title>

<style>

body{
margin:0;
font-family:Arial;
background:#021b33;
color:white;
}

/* HEADER */

header{
background:#051d44;
padding:15px 40px;
display:flex;
justify-content:space-between;
align-items:center;
border-bottom:2px solid red;
}

.logo{
display:flex;
align-items:center;
gap:10px;
}

.logo img{
height:55px;
}

/* LOGO */

.logo-text{
font-size:28px;
font-weight:900;
background:linear-gradient(90deg,#6a00ff,#ff2a6d);
-webkit-background-clip:text;
color:transparent;
text-transform:uppercase;
letter-spacing:2px;
}

/* NAV */

nav{
display:flex;
align-items:center;
}

/* MAISON PRO */

.home-btn{
background:#1f4ed8;
padding:10px 14px;
border-radius:10px;
margin-left:15px;
display:flex;
align-items:center;
justify-content:center;
transition:0.3s;
}

.home-btn img{
width:18px;
filter:invert(1);
}

.home-btn:hover{
background:#2563eb;
transform:scale(1.1);
}

nav a{
color:white;
margin-left:20px;
text-decoration:none;
font-weight:bold;
}

/* MENU BTN */

.menu-btn{
font-size:26px;
margin-left:20px;
cursor:pointer;
}

/* MENU LATÉRAL */

.side-menu{
position:fixed;
top:0;
right:-320px;
width:320px;
height:100%;
background:#03122a;
padding:30px;
transition:0.4s;
z-index:1001;
display:flex;
flex-direction:column;
box-shadow:-10px 0 30px rgba(0,0,0,0.6);
}

.side-menu.active{
right:0;
}

.side-menu a{
color:white;
text-decoration:none;
margin:15px 0;
font-size:18px;
padding:10px;
border-radius:8px;
}

.side-menu a:hover{
background:#1f4ed8;
}

.close-btn{
font-size:24px;
align-self:flex-end;
cursor:pointer;
margin-bottom:20px;
}

/* OVERLAY */

.overlay{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.6);
backdrop-filter:blur(5px);
opacity:0;
visibility:hidden;
transition:0.4s;
z-index:1000;
}

.overlay.active{
opacity:1;
visibility:visible;
}

/* HERO */

.hero{
height:700px;
background:
linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)),
url("marseille.png") center/cover no-repeat;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
}

.hero h1{
font-size:55px;
}

.description{
max-width:900px;
}

/* JOUEURS */

.players-box{
background:#1f4ed8;
padding:12px 30px;
border-radius:8px;
margin-top:20px;
}

/* BUTTON */

.btn{
padding:15px 35px;
border-radius:6px;
background:#28a745;
color:white;
text-decoration:none;
margin:10px;
display:inline-block;
}

/* FEATURES */

.features{
padding:80px 20px;
text-align:center;
}

.cards{
display:flex;
gap:40px;
justify-content:center;
}

.card img{
width:300px;
border-radius:10px;
}

/* TEAM */

.team{
padding:80px;
text-align:center;
}

.member{
margin:20px;
}

footer{
text-align:center;
padding:20px;
}

</style>

</head>

<body>

<div id="overlay" class="overlay" onclick="closeMenu()"></div>

<header>

<div class="logo">
<img src="logo.png">
<div class="logo-text">MVP | FivePD</div>
</div>

<nav>

<a href="index.html" class="home-btn">
<img src="https://cdn-icons-png.flaticon.com/512/1946/1946436.png">
</a>

<a href="deban.html">Déban</a>

<div class="menu-btn" onclick="openMenu()">☰</div>

</nav>

</header>

<!-- MENU -->

<div id="sideMenu" class="side-menu">

<div class="close-btn" onclick="closeMenu()">✖</div>

<a href="index.html">Accueil</a>
<a href="fivem://connect/51.77.27.175:30195">Rejoindre</a>
<a href="reglement.html">Règlement</a>
<a href="deban.html">Déban</a>

</div>

<section class="hero">

<h1>Bienvenue sur MVP | FivePD</h1>

<p class="description">
Serveur GTA RP basé sur Marseille avec 64 slots.
</p>

<div class="players-box">
👥 <span id="players">0</span> / 64
</div>

<a class="btn" href="fivem://connect/51.77.27.175:30195">Rejoindre</a>

</section>

<section class="features">

<div class="cards">

<img src="illegal.png">
<img src="medecine.png">
<img src="police.png">

</div>

</section>

<footer>
MVP | FivePD
</footer>

<script>

function openMenu(){
document.getElementById("sideMenu").classList.add("active");
document.getElementById("overlay").classList.add("active");
}

function closeMenu(){
document.getElementById("sideMenu").classList.remove("active");
document.getElementById("overlay").classList.remove("active");
}

fetch("https://api.allorigins.win/raw?url=http://51.77.27.175:30195/players.json")
.then(res => res.json())
.then(data => {
document.getElementById("players").innerText = data.length;
});

</script>

</body>
</html>
